name: Build and Deploy OpenWrt Packages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    outputs:
      engarde-hash: ${{ steps.engarde-version.outputs.hash }}
    steps:
      - name: Checkout engarde source
        uses: actions/checkout@v4
        with:
          repository: porech/engarde
          path: engarde-src

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd engarde-src
          make frontend

      - name: Get engarde commit hash
        id: engarde-version
        run: |
          cd engarde-src
          echo "hash=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: engarde-src/internal/assets/browser/

  build:
    runs-on: ubuntu-latest
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        openwrt:
          - version: "24.10.6"
            branch: "24.10"
            pkg_format: ipk
          - version: "25.12.2"
            branch: "25.12"
            pkg_format: apk
        arch:
          - name: x86_64
            target: x86
            subtarget: "64"
          - name: aarch64_generic
            target: armsr
            subtarget: armv8
          - name: arm_cortex-a7_neon-vfpv4
            target: sunxi
            subtarget: cortexa7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: frontend-assets

      - name: Determine SDK filename
        id: sdk-name
        run: |
          VERSION="${{ matrix.openwrt.version }}"
          TARGET="${{ matrix.arch.target }}"
          SUBTARGET="${{ matrix.arch.subtarget }}"
          BASE_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}"
          SDK_FILE=$(curl -sL "${BASE_URL}/sha256sums" | grep -oE 'openwrt-sdk-[^ ]+\.tar\.[a-z]+' | head -1)
          if [ -z "$SDK_FILE" ]; then
            echo "ERROR: Could not find SDK for ${VERSION} ${TARGET}/${SUBTARGET}"
            exit 1
          fi
          echo "url=${BASE_URL}/${SDK_FILE}" >> "$GITHUB_OUTPUT"
          echo "file=${SDK_FILE}" >> "$GITHUB_OUTPUT"

      - name: Cache OpenWrt SDK
        uses: actions/cache@v4
        id: cache-sdk
        with:
          path: sdk.tar.*
          key: openwrt-sdk-${{ matrix.openwrt.version }}-${{ matrix.arch.target }}-${{ matrix.arch.subtarget }}

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q "${{ steps.sdk-name.outputs.url }}" -O "${{ steps.sdk-name.outputs.file }}"

      - name: Extract SDK
        run: |
          mkdir -p /tmp/sdk
          tar xf ${{ steps.sdk-name.outputs.file }} --strip-components=1 -C /tmp/sdk

      - name: Configure feeds
        run: |
          cd /tmp/sdk
          cp feeds.conf.default feeds.conf
          echo "src-link engarde ${{ github.workspace }}" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install engarde-client engarde-server luci-app-engarde

      - name: Override PKG_RELEASE and inject engarde version
        run: |
          RELEASE=$(git rev-list --count HEAD)
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=${RELEASE}/" /tmp/sdk/feeds/engarde/engarde/Makefile
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=${RELEASE}/" /tmp/sdk/feeds/engarde/luci-app-engarde/Makefile 2>/dev/null || true
          ENGARDE_HASH="${{ needs.frontend.outputs.engarde-hash }}"
          sed -i "s/^GO_PKG_LDFLAGS:=.*/GO_PKG_LDFLAGS:=-s -w -X 'main.Version=${ENGARDE_HASH}'/" /tmp/sdk/feeds/engarde/engarde/Makefile

      - name: Build packages
        env:
          APK_SIGNING_KEY: ${{ secrets.APK_SIGNING_KEY }}
        run: |
          cd /tmp/sdk
          make defconfig
          # Inject our permanent signing key (defconfig generates an ephemeral one)
          if [ -n "$APK_SIGNING_KEY" ] && [ "${{ matrix.openwrt.pkg_format }}" = "apk" ]; then
            echo "$APK_SIGNING_KEY" > /tmp/sdk/private-key.pem
            openssl ec -in /tmp/sdk/private-key.pem -pubout > /tmp/sdk/public-key.pem 2>/dev/null
          fi
          cp -r ${{ github.workspace }}/frontend-assets /tmp/sdk/frontend-assets
          make package/engarde/compile package/luci-app-engarde/compile V=s -j$(nproc)

      - name: Collect packages and generate index
        run: |
          PKG_EXT="${{ matrix.openwrt.pkg_format }}"
          mkdir -p packages
          find /tmp/sdk/bin/ -name "engarde-*.${PKG_EXT}" -exec cp {} packages/ \;
          find /tmp/sdk/bin/ -name "luci-app-engarde*.${PKG_EXT}" -exec cp {} packages/ \;

          # Generate index using SDK tools while they're available
          if [ "$PKG_EXT" = "apk" ]; then
            # Trust our signing key for index verification
            sudo mkdir -p /etc/apk/keys
            sudo cp /tmp/sdk/public-key.pem /etc/apk/keys/
            cd packages
            /tmp/sdk/staging_dir/host/bin/apk mkndx \
              --sign /tmp/sdk/private-key.pem \
              --output packages.adb *.apk
            cd ..
          fi

          echo "Collected:"
          ls -la packages/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.openwrt.branch }}-${{ matrix.arch.name }}
          path: packages/

  upload:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize packages by version and architecture
        run: |
          for dir in artifacts/packages-*/; do
            name=$(basename "$dir" | sed 's/packages-//')
            branch="${name%%-*}"
            arch="${name#*-}"
            mkdir -p "repo/${branch}/${arch}"
            cp "$dir"/* "repo/${branch}/${arch}/" 2>/dev/null || true
          done

      - name: Generate opkg indexes (24.10)
        env:
          USIGN_SEC_KEY: ${{ secrets.USIGN_SEC_KEY }}
          USIGN_PUB_KEY: ${{ secrets.USIGN_PUB_KEY }}
        run: |
          # Install usign
          sudo apt-get -qq install -y usign 2>/dev/null || {
            git clone https://git.openwrt.org/project/usign.git /tmp/usign-src
            cd /tmp/usign-src && cmake . && make && sudo cp usign /usr/local/bin/
            cd "$OLDPWD"
          }

          if [ -n "$USIGN_SEC_KEY" ]; then
            echo "$USIGN_SEC_KEY" > /tmp/usign.sec
          fi

          # Generate Packages index only for ipk directories
          for arch_dir in repo/*/*/; do
            cd "$arch_dir"
            if ls *.ipk 1>/dev/null 2>&1; then
              for ipk in *.ipk; do
                tar -xOf "$ipk" ./control.tar.gz 2>/dev/null | tar xzf - --to-stdout ./control 2>/dev/null || \
                  tar -xOf "$ipk" ./control.tar.zst 2>/dev/null | zstd -d | tar xf - --to-stdout ./control 2>/dev/null || true
                echo "Filename: $ipk"
                echo "Size: $(stat -c %s "$ipk")"
                echo "SHA256sum: $(sha256sum "$ipk" | cut -d' ' -f1)"
                echo ""
              done > Packages
              gzip -9c Packages > Packages.gz
              if [ -f /tmp/usign.sec ]; then
                usign -S -m Packages -s /tmp/usign.sec
              fi
            fi
            # apk directories already have packages.adb from the build step
            cd "$OLDPWD"
          done

          rm -f /tmp/usign.sec

      - name: Add public keys to repo
        env:
          USIGN_PUB_KEY: ${{ secrets.USIGN_PUB_KEY }}
          APK_SIGNING_PUB: ${{ secrets.APK_SIGNING_PUB }}
        run: |
          # opkg signing key (24.10)
          if [ -n "$USIGN_PUB_KEY" ]; then
            echo "$USIGN_PUB_KEY" > repo/engarde-repo.pub
          fi
          # apk signing key (25.12)
          if [ -n "$APK_SIGNING_PUB" ]; then
            echo "$APK_SIGNING_PUB" > repo/engarde-apk.pem
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy:
    needs: upload
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
